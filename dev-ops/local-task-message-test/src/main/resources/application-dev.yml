server:
  port: 8091

# 数据库配置；启动时配置数据库资源信息
spring:
  datasource:
    username: root
    password: Nstr.234808
    url: jdbc:mysql://10.2.16.69:3306/local_task_message?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=Asia/Shanghai&useSSL=true&sessionVariables=sql_mode='NO_ENGINE_SUBSTITUTION,STRICT_TRANS_TABLES'
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: Retail_HikariCP
      minimum-idle: 15 #最小空闲连接数量
      idle-timeout: 180000 #空闲连接存活最大时间，默认600000（10分钟）
      maximum-pool-size: 25 #连接池最大连接数，默认是10
      auto-commit: true  #此属性控制从池返回的连接的默认自动提交行为,默认值：true
      max-lifetime: 1800000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
      connection-timeout: 30000 #数据库连接超时时间,默认30秒，即30000
      connection-test-query: SELECT 1
  # RabbitMQ
  rabbitmq:
    addresses: 10.2.16.71
    port: 15672
    username: admin
    password: admin
    listener:
      simple:
        prefetch: 1 # 每次投递n个消息，消费完在投递n个
    template:
      delivery-mode: persistent # 确保全局默认设置为持久化（可选）
    # 消息配置
    config:
      # 生产者
      producer:
        # 绑定交换机，统一一套交换机
        exchange: ltm_test_exchange
        # 消息主题配置；路由key、队列
        topic_order_success:
          # 消息主题
          routing_key: topic.order_success
          # 消费队列
          queue: ltm_test_queue_2_order_success

# MyBatis 配置【如需使用记得打开】
mybatis:
  mapper-locations: classpath:/mybatis/mapper/*.xml
  config-location:  classpath:/mybatis/config/mybatis-config.xml

cactusli:
  wrench:
    task:
      config:
        groups:
          # 使用 cron 表达式调度（每 10 秒执行一次）
          - groupId: group01
            houseNumbers: [0, 1, 2, 3]
            cron: "0/10 * * * * ?"
            limit: 100
          # 使用固定延迟调度（每 5 秒执行一次）
          - groupId: group02
            houseNumbers: [4, 5, 6, 7, 8, 9]
            fixedDelayMs: 5000
            limit: 50

logging:
  level:
    root: info
  config: classpath:logback-spring.xml